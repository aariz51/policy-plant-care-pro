name: safemama
description: "A new Flutter project."
publish_to: 'none'

# In pubspec.yaml
version: 1.0.2+1 # <-- Change this to 1.0.2 and a new build number

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- YOUR APP'S PACKAGES ---
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  go_router: ^15.1.2
  http: ^1.2.2
  http_parser: ^4.0.2
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.5.6
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  image: ^4.2.0
  mime_type: ^1.0.0
  file_picker: ^8.0.0
  
  # Added for iOS
  in_app_purchase: ^3.1.16
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3
  purchases_flutter: ^8.3.0

  # Camera, ML Kit, and Permissions
  camera: ^0.11.1
  google_mlkit_object_detection: 0.13.0
  permission_handler: ^12.0.0+1
  mobile_scanner: ^7.0.0 # Upgraded for compatibility
  speech_to_text: ^7.0.0
  google_mlkit_text_recognition: ^0.13.0 # Added for OCR
  google_mlkit_commons: ^0.7.1

  # Social & Device
  share_plus: ^11.0.0
  google_sign_in: ^6.2.1
  device_info_plus: ^11.4.0

  # UI Components & Helpers
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  country_picker: ^2.0.20
  url_launcher: ^6.3.0
  flutter_markdown: ^0.7.1
  pinput: ^5.0.1
  flutter_speed_dial: ^7.0.0
  smooth_page_indicator: ^1.1.0
  webview_flutter: ^4.7.0 # <-- THIS LINE HAS BEEN RE-ADDED

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.5.1
  table_calendar: ^3.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # Downgraded to match sdk constraint
  flutter_launcher_icons: ^0.13.1

# Flutter-specific configuration
flutter:
  uses-material-design: true
  # generate: true  # Temporarily disabled - using manual localization
  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
    - assets/logos/
    - .env

# Native platform-specific configuration
platform:
  ios:
    deployment_target: "15.5"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/logo_for_icon.png"
  min_sdk_android: 21
